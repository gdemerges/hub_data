name: Refresh missing covers

on:
  push:
    paths:
      - 'web/data/games.json'
      - 'web/data/films.json'
      - 'web/data/series.json'
  schedule:
    # Every Sunday at 4am UTC (after the sync.yml at 3am)
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  refresh-covers:
    runs-on: ubuntu-latest
    # Skip if the commit was made by the bot (prevents infinite loops)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Fetch missing covers
        id: refresh
        run: |
          node_exit=0
          npx tsx scripts/refresh-covers.ts || node_exit=$?
          # exit 0 = changes made, exit 1 = error, others = no changes
          echo "exit_code=$node_exit" >> $GITHUB_OUTPUT
        working-directory: web
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Commit updated covers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/games.json web/data/films.json web/data/series.json data/media-covers-cache.json || true
          git diff --cached --quiet || git commit -m "chore: refresh missing covers [skip ci]"
          git push
