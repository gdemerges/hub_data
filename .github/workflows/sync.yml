name: Sync data from CSV

# This workflow requires CSV files in data/seriebox/ (gitignored).
# Typical workflow:
#   1. Update CSVs locally (Seriebox export, etc.)
#   2. Run locally: cd web && npm run build:data
#   3. git add web/data/*.json && git push
#   → refresh-covers.yml then auto-fetches any missing covers
#
# This workflow is kept for reference / manual rebuilds on CI if CSVs
# are uploaded as artifacts first.

on:
  schedule:
    # Every Sunday at 3am UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      skip_covers:
        description: 'Skip cover image fetching (faster, use refresh-covers.yml separately)'
        type: boolean
        default: false

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build data JSON from CSV files
        run: npx tsx scripts/build-data.ts
        working-directory: web
        env:
          IGDB_CLIENT_ID: ${{ inputs.skip_covers && '' || secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ inputs.skip_covers && '' || secrets.IGDB_CLIENT_SECRET }}
          TMDB_API_KEY: ${{ inputs.skip_covers && '' || secrets.TMDB_API_KEY }}
        # NOTE: This step will fail if data/seriebox/*.csv files are not present.
        # For CI use, upload the CSV files as artifacts before running this step,
        # or run build-data.ts locally and commit the resulting JSON files instead.
        continue-on-error: true

      - name: Commit updated JSON and cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/*.json data/media-covers-cache.json || true
          git diff --cached --quiet || git commit -m "chore: auto-sync media data [skip ci]"
          git push
